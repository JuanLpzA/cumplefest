# =============================================
# CUMPLE EN LENIN HOUSE - Configuraciˇn
# =============================================
spring.application.name=cumpleapp 

# =============================================
# BASE DE DATOS MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/cumple_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=false

# =============================================
# SERVIDOR
# =============================================
server.port=8080

# =============================================
# JACKSON
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=America/Lima

# =============================================
# LOGGING
# =============================================
logging.level.root=INFO
logging.level.com.leninhouseapp=DEBUG